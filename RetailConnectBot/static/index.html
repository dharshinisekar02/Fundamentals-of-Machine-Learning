<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StyleBot — Retail Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0d0d0d;
    --surface:  #161616;
    --surface2: #1e1e1e;
    --border:   #2a2a2a;
    --accent:   #c8a96e;
    --accent2:  #e8c99e;
    --text:     #f0ece4;
    --muted:    #888;
    --bot-bg:   #1e1e1e;
    --user-bg:  #c8a96e;
    --user-text:#0d0d0d;
    --radius:   18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .brand-logo {
    width: 38px; height: 38px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: #0d0d0d;
    font-weight: 400;
  }

  .brand-name {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--text);
    letter-spacing: 0.3px;
  }

  .brand-tag {
    font-size: 12px;
    color: var(--muted);
    font-weight: 300;
    margin-top: 1px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .status-dot {
    width: 8px; height: 8px;
    background: #4caf7d;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-text {
    font-size: 12px;
    color: var(--muted);
    font-weight: 300;
  }

  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── Slots bar ── */
  .slots-bar {
    padding: 10px 28px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
    min-height: 44px;
    align-items: center;
  }

  .slot-label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-right: 4px;
  }

  .slot-tag {
    background: rgba(200, 169, 110, 0.12);
    border: 1px solid rgba(200, 169, 110, 0.3);
    color: var(--accent2);
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 400;
    display: flex;
    align-items: center;
    gap: 5px;
    animation: tagIn 0.3s ease;
  }

  @keyframes tagIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }

  .slot-tag .slot-key {
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  /* ── Chat area ── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Messages ── */
  .msg-row {
    display: flex;
    gap: 10px;
    max-width: 720px;
    animation: msgIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }

  .msg-row.bot {
    align-self: flex-start;
  }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    margin-top: 2px;
  }

  .avatar.bot-av {
    background: var(--accent);
    color: #0d0d0d;
    font-family: 'DM Serif Display', serif;
    font-size: 15px;
  }

  .avatar.user-av {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14.5px;
    line-height: 1.6;
    max-width: 520px;
  }

  .bot .bubble {
    background: var(--bot-bg);
    color: var(--text);
    border-bottom-left-radius: 4px;
    border: 1px solid var(--border);
  }

  .user .bubble {
    background: var(--user-bg);
    color: var(--user-text);
    border-bottom-right-radius: 4px;
    font-weight: 400;
  }

  .intent-badge {
    font-size: 10px;
    color: var(--muted);
    margin-top: 5px;
    padding-left: 2px;
    font-weight: 300;
    letter-spacing: 0.3px;
  }

  /* ── Typing indicator ── */
  .typing-row {
    display: flex;
    gap: 10px;
    align-items: center;
    animation: msgIn 0.3s ease;
  }

  .typing-dots {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
    padding: 14px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .dot {
    width: 6px; height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* ── Quick replies ── */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding-left: 42px;
    animation: msgIn 0.4s ease 0.1s both;
  }

  .quick-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    padding: 7px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.18s;
    font-weight: 300;
  }

  .quick-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,169,110,0.06);
  }

  /* ── Welcome card ── */
  .welcome-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 8px;
    max-width: 500px;
    align-self: center;
    text-align: center;
    animation: msgIn 0.5s ease;
  }

  .welcome-icon {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    color: var(--accent);
    margin-bottom: 12px;
    font-style: italic;
  }

  .welcome-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    margin-bottom: 8px;
    color: var(--text);
  }

  .welcome-sub {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    font-weight: 300;
  }

  /* ── Input area ── */
  .input-area {
    padding: 16px 28px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 26px;
    padding: 8px 8px 8px 18px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within {
    border-color: rgba(200,169,110,0.5);
  }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14.5px;
    font-weight: 300;
    resize: none;
    min-height: 24px;
    max-height: 100px;
    line-height: 1.5;
    padding: 2px 0;
  }

  #user-input::placeholder {
    color: var(--muted);
    opacity: 0.6;
  }

  #send-btn {
    width: 38px; height: 38px;
    background: var(--accent);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.18s;
  }

  #send-btn:hover { background: var(--accent2); transform: scale(1.05); }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  #send-btn svg { color: #0d0d0d; }

  .input-hint {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 10px;
    font-weight: 300;
    opacity: 0.7;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-logo">S</div>
    <div>
      <div class="brand-name">StyleBot</div>
      <div class="brand-tag">Retail Assistant</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-dot"></div>
    <div class="status-text">Online</div>
    <button class="reset-btn" onclick="resetChat()">New chat</button>
  </div>
</header>

<div class="slots-bar" id="slots-bar">
  <span class="slot-label">Context:</span>
  <span id="slots-empty" style="font-size:12px;color:var(--muted);font-weight:300;font-style:italic;">nothing collected yet</span>
</div>

<div class="chat-area" id="chat-area">
  <div class="welcome-card">
    <div class="welcome-icon">✦</div>
    <div class="welcome-title">Hey, I'm StyleBot</div>
    <div class="welcome-sub">Ask me about products, sizes, prices, colors, or your orders. I remember what you tell me across the conversation.</div>
  </div>

  <div class="quick-replies" id="initial-quick" style="justify-content:center;padding-left:0;">
    <button class="quick-btn" onclick="sendQuick('What products do you have?')">Browse products</button>
    <button class="quick-btn" onclick="sendQuick('Is blue kurti available in M?')">Check availability</button>
    <button class="quick-btn" onclick="sendQuick('What are your prices?')">View prices</button>
    <button class="quick-btn" onclick="sendQuick('How do I place an order?')">Place an order</button>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="user-input" placeholder="Ask about products, sizes, prices..." rows="1" autocomplete="off"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
</div>

<script>
  const SESSION_ID = 'session_' + Math.random().toString(36).slice(2);
  const API_BASE   = window.location.origin;

  const chatArea = document.getElementById('chat-area');
  const input    = document.getElementById('user-input');
  const sendBtn  = document.getElementById('send-btn');

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 100) + 'px';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function sendQuick(text) {
    const el = document.getElementById('initial-quick');
    if (el) el.remove();
    input.value = text;
    sendMessage();
  }

  function addMessage(text, role, intent, confidence) {
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const av = document.createElement('div');
    av.className = `avatar ${role === 'bot' ? 'bot-av' : 'user-av'}`;
    av.textContent = role === 'bot' ? 'S' : 'U';

    const wrap = document.createElement('div');

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(bubble);

    if (role === 'bot' && intent) {
      const badge = document.createElement('div');
      badge.className = 'intent-badge';
      badge.textContent = `${intent}  ·  ${confidence}% confidence`;
      wrap.appendChild(badge);
    }

    row.appendChild(av);
    row.appendChild(wrap);
    chatArea.appendChild(row);
    chatArea.scrollTop = chatArea.scrollHeight;
    return row;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'typing-row';
    row.id = 'typing';
    const av = document.createElement('div');
    av.className = 'avatar bot-av';
    av.textContent = 'S';
    const dots = document.createElement('div');
    dots.className = 'typing-dots';
    dots.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    row.appendChild(av);
    row.appendChild(dots);
    chatArea.appendChild(row);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function updateSlots(slots) {
    const bar   = document.getElementById('slots-bar');
    const empty = document.getElementById('slots-empty');
    const active = Object.entries(slots).filter(([k,v]) => v);

    if (active.length === 0) {
      if (empty) empty.style.display = '';
      document.querySelectorAll('.slot-tag').forEach(e => e.remove());
      return;
    }

    if (empty) empty.style.display = 'none';
    document.querySelectorAll('.slot-tag').forEach(e => e.remove());

    active.forEach(([key, val]) => {
      const tag = document.createElement('div');
      tag.className = 'slot-tag';
      tag.innerHTML = `<span class="slot-key">${key}</span>${val}`;
      bar.appendChild(tag);
    });
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    const el = document.getElementById('initial-quick');
    if (el) el.remove();

    addMessage(text, 'user');
    showTyping();

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ message: text, session_id: SESSION_ID })
      });
      const data = await res.json();
      hideTyping();
      addMessage(data.response, 'bot', data.intent, data.confidence);
      if (data.slots) updateSlots(data.slots);
    } catch (err) {
      hideTyping();
      addMessage('Connection error. Make sure the Flask server is running.', 'bot', 'error', 0);
    }

    sendBtn.disabled = false;
    input.focus();
  }

  async function resetChat() {
    await fetch(`${API_BASE}/reset`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ session_id: SESSION_ID })
    });
    chatArea.innerHTML = `
      <div class="welcome-card">
        <div class="welcome-icon">✦</div>
        <div class="welcome-title">Hey, I'm StyleBot</div>
        <div class="welcome-sub">Ask me about products, sizes, prices, colors, or your orders.</div>
      </div>
      <div class="quick-replies" id="initial-quick" style="justify-content:center;padding-left:0;">
        <button class="quick-btn" onclick="sendQuick('What products do you have?')">Browse products</button>
        <button class="quick-btn" onclick="sendQuick('Is blue kurti available in M?')">Check availability</button>
        <button class="quick-btn" onclick="sendQuick('What are your prices?')">View prices</button>
        <button class="quick-btn" onclick="sendQuick('How do I place an order?')">Place an order</button>
      </div>`;
    updateSlots({});
    document.getElementById('slots-empty').style.display = '';
  }
</script>
</body>
</html>
